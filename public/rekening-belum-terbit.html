<!DOCTYPE html>
<html>
<head>
  <title>Rekening Belum Terbit</title>

  <style>
    body{
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:#e5e7eb;
      padding:20px;
    }

    h2{margin-bottom:16px}

    .card{
      background:rgba(255,255,255,0.05);
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
      backdrop-filter:blur(10px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
    }

    .filters{display:flex;gap:10px;flex-wrap:wrap}

    input,select{
      padding:8px;
      border-radius:8px;
      border:none;
      background:#1e293b;
      color:white;
      min-width:120px;
    }

    .actions{display:flex;gap:10px}

    .btn{
      padding:10px 16px;
      border-radius:10px;
      border:none;
      font-size:13px;
      cursor:pointer;
      color:white;
      min-width:90px;
      transition:.2s;
    }

    .btn:hover{transform:translateY(-2px)}

    .primary{background:linear-gradient(135deg,#38bdf8,#0ea5e9)}
    .excel{background:linear-gradient(135deg,#22c55e,#15803d)}
    .pdf{background:linear-gradient(135deg,#ef4444,#991b1b)}

    .btn:disabled{opacity:.4;cursor:not-allowed}

    /* SUMMARY */
    .summary{display:flex;gap:12px;flex-wrap:wrap}
    .box{
      flex:1;
      min-width:130px;
      background:rgba(56,189,248,0.12);
      border:1px solid rgba(56,189,248,0.3);
      border-radius:12px;
      padding:12px;
      text-align:center;
    }
    .box span{font-size:20px;font-weight:bold}

    /* TABLE */
    .table-wrapper{
      max-height:420px;
      overflow:auto;
      border-radius:12px;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      font-size:13px;
    }

    thead th{
      position:sticky;
      top:0;
      background:#1e293b;
      z-index:2;
      padding:12px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,0.15);
    }

    tbody td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    tbody tr:nth-child(even){
      background:rgba(255,255,255,0.02);
    }

    tbody tr:hover{
      background:rgba(56,189,248,0.15);
    }

    tbody tr.active{
      background:rgba(56,189,248,0.25);
    }

    /* loading */
    .loading{
      text-align:center;
      padding:25px;
      display:none;
    }

    .spinner{
      width:40px;
      height:40px;
      border:5px solid rgba(255,255,255,0.1);
      border-top:5px solid #38bdf8;
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:auto;
    }

    @keyframes spin{
      100%{transform:rotate(360deg)}
    }

    .back{margin-bottom:10px;color:#38bdf8;cursor:pointer}
  </style>
</head>

<body>

<div class="back" onclick="location.href='/rekeningapps'">← Kembali</div>

<h2>Rekening Belum Terbit</h2>

<div class="card">
  <div class="topbar">
    <div class="filters">
      <div>
        Periode<br>
        <input id="periode" placeholder="YYYYMM">
      </div>
      <div>
        Cabang<br>
        <select id="cabang">
          <option value="">Semua</option>
          <option value="1">Ungaran</option>
          <option value="2">Salatiga</option>
          <option value="3">Ambarawa</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button id="btnLoad" class="btn primary" disabled>Tampilkan</button>
      <button id="btnExport" class="btn excel" disabled>Excel</button>
      <button id="btnPDF" class="btn pdf" disabled>PDF</button>
    </div>
  </div>
</div>

<div class="card summary">
  <div class="box">Total<br><span id="total">0</span></div>
  <div class="box">Ungaran<br><span id="ungaran">0</span></div>
  <div class="box">Salatiga<br><span id="salatiga">0</span></div>
  <div class="box">Ambarawa<br><span id="ambarawa">0</span></div>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div>Loading...</div>
</div>

<div class="card">
  <div class="table-wrapper">
    <table id="table"></table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js"></script>

<script src="/rekening-belum-terbit.js"></script>

</body>
</html>
